<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>みきいど確変ルーレット</title>

<style>

*{
    box-sizing:border-box;
}

body{
    margin:0;
    background:#05070c;
    overflow:hidden;
    height:100vh;

    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;

    font-family:
      -apple-system,
      BlinkMacSystemFont,
      sans-serif;
}

.screen{

    width:100vw;
    height:420px;

    overflow:hidden;
    position:relative;

    background:
      radial-gradient(
        circle at center,
        #1d3557 0%,
        #0a1224 60%,
        #000 100%
      );
}

.screen::before{

    content:"";

    position:absolute;
    inset:0;

    background:
      linear-gradient(
        to bottom,
        rgba(0,0,0,.92),
        rgba(0,0,0,.35) 35%,
        rgba(0,220,255,.12) 50%,
        rgba(0,0,0,.35) 65%,
        rgba(0,0,0,.92)
      );

    z-index:3;
    pointer-events:none;
}

.scanlines{

    position:absolute;
    inset:0;

    background:
      repeating-linear-gradient(
        transparent 0px,
        transparent 5px,
        rgba(255,255,255,.03) 6px
      );

    z-index:4;
}

#reel{
    position:relative;
    z-index:1;
}

.item{

    width:100%;
    height:120px;

    display:flex;
    align-items:center;
    justify-content:center;

    text-align:center;

    font-size:82px;
    font-weight:800;

    opacity:.28;

    color:#62dfff;

    transform:scale(.75);

    transition:
      transform .35s,
      opacity .35s;

    white-space:nowrap;

    text-shadow:
      0 0 12px rgba(0,220,255,.6);
}

.item.alt{
    color:#ffc6ff;
}

.item.selected{

    opacity:1;

    color:white;

    transform:scale(1.7);

    text-shadow:
      0 0 10px white,
      0 0 20px white,
      0 0 40px #00d4ff,
      0 0 80px #00d4ff;

    animation:winner .4s ease-out;
}

@keyframes winner{

    0%{
        transform:scale(1.3);
    }

    60%{
        transform:scale(1.9);
    }

    100%{
        transform:scale(1.7);
    }
}

button{

    margin-top:30px;

    border:none;

    padding:14px 34px;

    font-size:22px;
    font-weight:bold;

    border-radius:12px;

    background:#00d4ff;

    color:#000;

    cursor:pointer;

    transition:.3s;
}

#result{

    margin-top:15px;

    color:white;

    font-size:28px;
    font-weight:bold;
}

/* ===== 確変演出 ===== */

#overlay{

    position:fixed;
    inset:0;

    background:black;

    display:none;

    overflow:hidden;

    z-index:9999;
}

/* 上半分パネル：出現!! */
#panel-top {
    position:absolute;
    inset:0;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
}

#panel-top img {
    position:absolute;
    top:0;
    width:100vw;
    height:100vh;
    object-fit:contain;
    object-position:center center;
    background:#000;
    animation: flash .2s infinite alternate;
}

/* 下半分パネル：終われねえ！ */
#panel-bottom {
    position:absolute;
    inset:0;
    display:none;
    justify-content:center;
    align-items:center;
    overflow:hidden;
}

#panel-bottom img {
    position:absolute;
    top:0;
    width:100vw;
    height:100vh;
    object-fit:contain;
    object-position:center center;
    background:#000;
    animation: flash .2s infinite alternate;
}

#thunder{

    position:absolute;
    inset:0;

    background:white;

    opacity:0;

    animation:
      thunder .4s infinite;

    z-index:10;
    pointer-events:none;
}

/* 遷移エフェクト用フラッシュ */
#transition-flash {
    position:absolute;
    inset:0;
    background:white;
    opacity:0;
    z-index:20;
    pointer-events:none;
    display:none;
}

@keyframes flash{

    from{
        filter:brightness(1);
    }

    to{
        filter:brightness(1.8);
    }
}

@keyframes thunder{

    0%{opacity:0;}
    10%{opacity:.9;}
    20%{opacity:0;}
    35%{opacity:.7;}
    100%{opacity:0;}
}

@keyframes transitionFlash {
    0%{opacity:0;}
    30%{opacity:1;}
    70%{opacity:1;}
    100%{opacity:0;}
}

</style>
</head>
<body>

<div class="screen">

    <div class="scanlines"></div>

    <div id="reel"></div>

</div>

<button id="spinButton" onclick="spin()">
抽選開始
</button>

<div id="result"></div>

<div id="overlay">

    <div id="thunder"></div>
    <div id="transition-flash"></div>

    <!-- 上半分：出現!! -->
    <div id="panel-top">
        <img src="mikiido_appear.PNG" alt="みきいど出現">
    </div>

    <!-- 下半分：終われねえ！ -->
    <div id="panel-bottom">
        <img src="mikiido_speech.PNG" alt="みきいど終われねえ">
    </div>

</div>

<script>

const names = [
 "じゅん",
 "いわ",
 "みっきー",
 "Fumio Asakura"
];

const reel =
 document.getElementById("reel");

const button =
 document.getElementById("spinButton");

for(let i=0;i<40;i++){

    names.forEach((name,index)=>{

        const div =
          document.createElement("div");

        div.className="item";

        if(index % 2){
            div.classList.add("alt");
        }

        div.textContent=name;

        reel.appendChild(div);

    });

}

let spinning=false;

function spin(){

    if(spinning) return;

    spinning=true;

    button.textContent="抽選中...";
    button.style.background="#00d4ff";

    document
      .querySelectorAll(".item")
      .forEach(x=>x.classList.remove("selected"));

    document
      .getElementById("result")
      .textContent="";

    const winner =
      Math.random() < 0.2
        ? 2
        : 1;

    runSpin(winner,false);
}

function runSpin(winnerIndex,isRetry){

    document
      .querySelectorAll(".item")
      .forEach(x=>x.classList.remove("selected"));

    reel.style.transition="none";
    reel.style.transform="translateY(0px)";

    void reel.offsetHeight;

    const itemHeight=120;
    const screenHeight=420;
    const loops=18;

    const centerOffset=
      screenHeight/2
      - itemHeight/2;

    const stop=
      ((loops*names.length)+winnerIndex)
      * itemHeight
      - centerOffset;

    reel.style.transition=
      "transform 10s cubic-bezier(.12,.85,.15,1)";

    reel.style.transform=
      `translateY(-${stop}px)`;

    setTimeout(()=>{

        const target=
          loops*names.length
          + winnerIndex;

        document
          .querySelectorAll(".item")[target]
          .classList.add("selected");

        if(winnerIndex===2 && !isRetry){

            startMikiido();

        }else{

            document
              .getElementById("result")
              .textContent=
              "選ばれたのは『いわ』";

            button.textContent="抽選開始";
            button.style.background="#00d4ff";

            spinning=false;
        }

    },10000);
}

function startMikiido(){

    document
      .querySelectorAll(".item")
      .forEach(x=>x.classList.remove("selected"));

    const overlay = document.getElementById("overlay");
    const panelTop = document.getElementById("panel-top");
    const panelBottom = document.getElementById("panel-bottom");
    const transitionFlash = document.getElementById("transition-flash");

    // 上半分を表示
    panelTop.style.display = "flex";
    panelBottom.style.display = "none";
    overlay.style.display = "block";

    // 2秒後：フラッシュで遷移して下半分へ
    setTimeout(()=>{

        transitionFlash.style.display = "block";
        transitionFlash.style.animation = "transitionFlash 0.5s ease forwards";

        setTimeout(()=>{
            panelTop.style.display = "none";
            panelBottom.style.display = "flex";
            transitionFlash.style.display = "none";
            transitionFlash.style.animation = "";
        }, 250);

    }, 2000);

    // 5秒後：オーバーレイを閉じて再抽選
    setTimeout(()=>{

        overlay.style.display = "none";
        panelTop.style.display = "none";
        panelBottom.style.display = "none";
        transitionFlash.style.display = "none";
        transitionFlash.style.animation = "";

        button.textContent="再抽選中...";
        button.style.background="#ff2d55";

        runSpin(1,true);

    },5000);
}

</script>

</body>
</html>
